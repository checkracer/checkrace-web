# Cloudflare Pages config for checkrace-web (static site + Pages Functions).
# The blog/rating Functions live in ./functions and use the D1 binding `DB`.
name = "checkrace-web"
compatibility_date = "2024-09-25"
pages_build_output_dir = "."

[[d1_databases]]
binding = "DB"
database_name = "checkrace-db"
database_id = "5baf870a-0ddf-4c09-9a05-a4b1d3c08197"

[[r2_buckets]]
binding = "R2"
bucket_name = "checkrace-media"
